version = 1
name = "using-one-code-cli"
title = "Use One Code CLI"
description = "Protocol for agents to delegate coding tasks through occ and read result documents."
entry = "SKILL.md"
requires_command = "occ"

[inputs]
cwd = "Required working directory for the delegated task."
prompt = "Task prompt text. Prefer --prompt for short text or --stdin for longer inline text."
prompt_file = "Optional prompt file for file-based, reusable, or explicitly file-required tasks."
agent = "Optional exact One Code CLI agent."
cli = "Optional CLI type: claude, codex, opencode, gemini."
session = "Optional One Code CLI session id for resume."

[outputs]
run_id = "One Code CLI run id."
session_id = "One Code CLI session id."
result_path = "Path to result.md."
metadata_path = "Path to run.toml."
exit_code = "Child CLI exit code when available."
